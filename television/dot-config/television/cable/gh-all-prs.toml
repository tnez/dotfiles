[metadata]
name = "gh-all-prs"
description = "Open pull requests across active GitHub owners"
requirements = ["gh"]

[source]
command = "~/.scripts/tv-gh-workbench.sh all-prs"
output = "{split:\\t:0}"
no_sort = true

[preview]
command = [
  "~/.scripts/tv-gh-workbench-preview.sh pr '{}' rendered",
  "~/.scripts/tv-gh-workbench-preview.sh pr '{}' raw",
]

[keybindings]
enter = "actions:view"
ctrl-o = "actions:browser"
ctrl-c = "actions:checkout"
alt-x = "actions:checks"
ctrl-d = "actions:diff"
ctrl-n = "scroll_preview_half_page_down"
ctrl-p = "scroll_preview_half_page_up"
alt-j = "actions:jump"
ctrl-a = "actions:agent_review"

[actions.view]
description = "View PR"
command = "~/.scripts/tv-gh-workbench-action.sh pr view '{}'"
mode = "fork"

[actions.browser]
description = "Open PR in browser"
command = "~/.scripts/tv-gh-workbench-action.sh pr browser '{}'"
mode = "fork"

[actions.checkout]
description = "Checkout PR"
command = "~/.scripts/tv-gh-workbench-action.sh pr checkout '{}'"
mode = "execute"

[actions.checks]
description = "View PR checks"
command = "~/.scripts/tv-gh-workbench-action.sh pr checks '{}'"
mode = "fork"

[actions.diff]
description = "View PR diff"
command = "~/.scripts/tv-gh-workbench-action.sh pr diff '{}'"
mode = "fork"

[actions.jump]
description = "Jump to repo session"
command = "~/.scripts/tv-gh-workbench-action.sh pr jump '{}'"
mode = "execute"

[actions.agent_review]
description = "Review PR with agent"
command = "~/.scripts/tv-gh-workbench-action.sh pr agent-review '{}'"
mode = "execute"
