# Television configuration
# https://github.com/alexpasmantier/television

# General settings
tick_rate = 50
default_channel = "files"
history_size = 200
global_history = false

[ui]
ui_scale = 90
orientation = "landscape"
theme = "default"

[ui.input_bar]
position = "top"
prompt = ">"
border_type = "rounded"

[ui.status_bar]
separator_open = ""
separator_close = ""
hidden = false

[ui.results_panel]
border_type = "rounded"

[ui.preview_panel]
size = 60
scrollbar = true
border_type = "rounded"
hidden = false

[ui.help_panel]
show_categories = true
hidden = true

[ui.remote_control]
show_channel_descriptions = true
sort_alphabetically = true

[keybindings]
# Application control
esc = "quit"
ctrl-c = "quit"

# Navigation and selection
down = "select_next_entry"
ctrl-n = "select_next_entry"
ctrl-j = "select_next_entry"
up = "select_prev_entry"
ctrl-p = "select_prev_entry"
ctrl-k = "select_prev_entry"

# History navigation
ctrl-up = "select_prev_history"
ctrl-down = "select_next_history"

# Multi-selection
tab = "toggle_selection_down"
backtab = "toggle_selection_up"
enter = "confirm_selection"

# Preview panel control
pagedown = "scroll_preview_half_page_down"
pageup = "scroll_preview_half_page_up"
ctrl-f = "cycle_previews"

# Data operations
ctrl-y = "copy_entry_to_clipboard"
ctrl-r = "reload_source"
ctrl-s = "cycle_sources"

# UI Features
ctrl-g = "toggle_remote_control"
ctrl-x = "toggle_action_picker"
alt-p = "toggle_preview"
ctrl-h = "toggle_help"
f12 = "toggle_status_bar"
ctrl-l = "toggle_layout"

# Input field actions
backspace = "delete_prev_char"
ctrl-w = "delete_prev_word"
ctrl-u = "delete_line"
delete = "delete_next_char"
left = "go_to_prev_char"
right = "go_to_next_char"
home = "go_to_input_start"
ctrl-a = "go_to_input_start"
end = "go_to_input_end"
ctrl-e = "go_to_input_end"

# Shell integration
[shell_integration]
fallback_channel = "files"

[shell_integration.channel_triggers]
"alias" = ["alias", "unalias"]
"env" = ["export", "unset"]
"dirs" = ["cd", "ls", "rmdir", "z", "pushd"]
"files" = [
  "cat",
  "less",
  "head",
  "tail",
  "vim",
  "nvim",
  "nano",
  "bat",
  "cp",
  "mv",
  "rm",
  "touch",
  "chmod",
  "chown",
  "ln",
  "tar",
  "zip",
  "unzip",
  "gzip",
  "gunzip",
  "xz",
]
"text" = ["rg", "grep"]
"git-diff" = ["git add", "git restore"]
"git-branch" = [
  "git checkout",
  "git switch",
  "git branch",
  "git merge",
  "git rebase",
  "git pull",
  "git push",
  "git diff",
]
"git-log" = ["git log", "git show"]
"git-repos" = ["code", "hx", "git clone"]
"docker-images" = ["docker run"]
"ssh-hosts" = ["ssh", "scp"]
"make-targets" = ["make"]
"tmux-sessions" = ["tmux attach", "tmux switch"]

[shell_integration.keybindings]
"smart_autocomplete" = "ctrl-o"
"command_history" = "ctrl-r"
