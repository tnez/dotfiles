[default_session]

# --- Reusable windows ---

[[window]]
name = "desk-inbox"
startup_script = "yazi ~/PARA/DESK/inbox"

[[window]]
name = "desk-outbox"
startup_script = "yazi ~/PARA/DESK/outbox"

[[window]]
name = "desktop"
startup_script = "yazi ~/Desktop"

[[window]]
name = "dottie"
startup_script = "claude --permission-mode auto"

[[window]]
name = "notes"
startup_script = "nvim ~/PARA"

[[window]]
name = "gh-dashboard"
startup_script = "~/.scripts/gh-dashboard.sh"

[[window]]
name = "calendar"
startup_script = "~/.scripts/helm-calendar.sh"

[[window]]
name = "reminders"
startup_script = "~/.scripts/helm-reminders.sh"

# --- Always-running sessions (managed by LaunchAgents) ---

[[session]]
name = "home"
path = "~"

[[session]]
name = "scratch"
path = "~/PARA/DESK/inbox"
startup_command = "nvim ~/PARA/DESK/inbox/scratch.md"

# --- Activity sessions ---

[[session]]
name = "inbox"
path = "~/PARA/DESK"
windows = ["desk-inbox", "desktop", "desk-outbox"]

[[session]]
name = "plan"
path = "~/PARA"
windows = ["dottie", "notes"]

[[session]]
name = "helm"
path = "~"
windows = ["gh-dashboard", "calendar", "reminders", "desk-inbox"]

[[session]]
name = "standup"
path = "~/PARA"
windows = ["gh-dashboard", "calendar", "notes"]

[[session]]
name = "weekly-review"
path = "~/PARA/DESK"
windows = ["desk-inbox", "desk-outbox", "dottie"]

[[session]]
name = "coffee-chat"
path = "~/PARA"
windows = ["dottie", "notes"]
